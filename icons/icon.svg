<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3730a3"/>
      <stop offset="55%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="92" ry="92" fill="url(#bg)"/>
  <rect width="512" height="512" rx="92" ry="92" fill="url(#shine)"/>

  <!-- 카드 -->
  <rect x="144" y="130" width="224" height="240" rx="24" ry="24" fill="rgba(255,255,255,0.96)"/>

  <!-- 텍스트 라인 1 -->
  <rect x="174" y="176" width="150" height="18" rx="9" ry="9" fill="#4f46e5"/>
  <!-- 텍스트 라인 2 -->
  <rect x="174" y="210" width="112" height="14" rx="7" ry="7" fill="#c7d2fe"/>
  <!-- 텍스트 라인 3 -->
  <rect x="174" y="238" width="82" height="14" rx="7" ry="7" fill="#c7d2fe"/>

  <!-- 구분선 -->
  <rect x="174" y="272" width="164" height="2" rx="1" fill="#e0e7ff"/>

  <!-- 책 이모지 대신 아이콘 -->
