  <!-- 하단 점 3개 (활동 표시) -->
  <circle cx="192" cy="338" r="7" fill="#4f46e5" opacity="0.5"/>
  <circle cx="216" cy="338" r="7" fill="#4f46e5" opacity="0.3"/>
  <circle cx="240" cy="338" r="7" fill="#4f46e5" opacity="0.2"/>
</svg>
